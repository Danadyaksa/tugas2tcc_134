<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksa's Notes Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="board-container">
        <header class="header">
            <h1>Post it Note</h1>
            <p>Tugas 2 Praktikum TCC | NIM 123230134</p>
        </header>

        <div class="main-content">
            <section class="notepad-input">
                <div class="notepad-header">Tulis Notes</div>
                <div class="notepad-body">
                    <input type="hidden" id="noteId">
                    <input type="text" id="judul" placeholder="Judul Catatan" autocomplete="off">
                    <textarea id="isi" rows="5" placeholder="Isi catatanmu di sini..."></textarea>
                    <button id="saveBtn" onclick="saveNote()">Simpan Notes</button>
                </div>
            </section>

            <section id="notesList" class="notes-grid">
                </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
